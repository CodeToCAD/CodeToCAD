<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:s="https://github.com/nturley/netlistsvg" width="194" height="182">
  <style>svg {
    stroke: #000;
    fill: none;
  }
  text {
    fill: #000;
    stroke: none;
    font-size: 10px;
    font-weight: bold;
    font-family: "Courier New", monospace;
  }
  .nodelabel {
    text-anchor: middle;
  }
  .inputPortLabel {
    text-anchor: end;
  }
  .splitjoinBody {
    fill: #000;
  }
  .symbol {
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-width: 2;
  }
  .detail {
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: #000;
  }</style>
  <g s:type="voltage_source" s:width="32" s:height="52" transform="translate(36,53)" id="cell_V1">
    <s:alias val="v"/>
    <text x="35" y="20" s:attribute="ref" class="cell_V1">V1</text>
    <text x="35" y="35" s:attribute="value" class="cell_V1">PULSE</text>
    <circle cx="16" cy="26" r="16" class="symbol cell_V1"/>
    <path d="M16,10 V42" class="detail cell_V1"/>
    <path d="M16,0 V10 M16,42 V52" class="connect cell_V1"/>
    <g s:x="16" s:y="0" s:pid="+" s:position="top"/>
    <g s:x="16" s:y="52" s:pid="-" s:position="bottom"/>
  </g>
  <g s:type="resistor_h" s:width="50" s:height="10" transform="translate(72,23)" id="cell_R1">
    <s:alias val="r_h"/>
    <text class="nodelabel cell_R1" x="25" y="-5" s:attribute="ref">R1</text>
    <text class="nodelabel cell_R1" x="25" y="20" s:attribute="value">1.6k</text>
    <path d="M10,0 H40 V10 H10 Z" class="symbol cell_R1"/>
    <path d="M0,5 H10 M40,5 H50" class="connect cell_R1"/>
    <g s:x="0" s:y="5" s:pid="A" s:position="left"/>
    <g s:x="50" s:y="5" s:pid="B" s:position="right"/>
  </g>
  <g s:type="capacitor_v" s:width="30" s:height="50" transform="translate(117,53)" id="cell_C1">
    <s:alias val="c_v"/>
    <text x="25" y="10" s:attribute="ref" class="cell_C1">C1</text>
    <text x="25" y="45" s:attribute="value" class="cell_C1">100n</text>
    <path d="M0,20 H30 M0,30 H30" class="symbol cell_C1"/>
    <path d="M15,0 V20 M15,30 V50" class="connect cell_C1"/>
    <g s:x="15" s:y="0" s:pid="A" s:position="top"/>
    <g s:x="15" s:y="50" s:pid="B" s:position="bottom"/>
  </g>
  <g s:type="inputExt" s:width="30" s:height="20" transform="translate(12,23)" id="cell_VIN">
    <text x="15" y="-4" class="cell_VIN" s:attribute="ref">VIN</text>
    <s:alias val="$_inputExt_"/>
    <path d="M0,0 V20 H15 L30,10 15,0 Z" class="cell_VIN"/>
    <g s:x="30" s:y="10" s:pid="Y" s:position="right"/>
  </g>
  <g s:type="outputExt" s:width="30" s:height="20" transform="translate(152,28)" id="cell_VOUT">
    <text x="15" y="-4" class="cell_VOUT" s:attribute="ref">VOUT</text>
    <s:alias val="$_outputExt_"/>
    <path d="M30,0 V20 H15 L0,10 15,0 Z" class="cell_VOUT"/>
    <g s:x="0" s:y="10" s:pid="A" s:position="left"/>
  </g>
  <g s:type="gnd" s:width="20" s:height="30" transform="translate(42,140)" id="cell_gnd_GND">
    <s:alias val="gnd"/>
    <text x="30" y="20" class="nodelabel cell_gnd_GND" s:attribute="name"></text>
    <path d="M0,0 H20 M3,5 H17 M7,10 H13 M10,0 V-15" class="cell_gnd_GND"/>
    <g s:x="10" s:y="-15" s:pid="A" s:position="top"/>
  </g>
  <line x1="72" x2="62" y1="28" y2="28" class="net_2"/>
  <line x1="62" x2="62" y1="28" y2="43" class="net_2"/>
  <line x1="62" x2="52" y1="43" y2="43" class="net_2"/>
  <circle cx="52" cy="43" r="2" style="fill:#000" class="net_2"/>
  <line x1="52" x2="52" y1="43" y2="53" class="net_2"/>
  <line x1="42" x2="52" y1="33" y2="33" class="net_2"/>
  <line x1="52" x2="52" y1="33" y2="53" class="net_2"/>
  <line x1="122" x2="132" y1="28" y2="28" class="net_3"/>
  <line x1="132" x2="132" y1="28" y2="53" class="net_3"/>
  <line x1="152" x2="142" y1="38" y2="38" class="net_3"/>
  <line x1="142" x2="142" y1="38" y2="43" class="net_3"/>
  <line x1="142" x2="132" y1="43" y2="43" class="net_3"/>
  <circle cx="132" cy="43" r="2" style="fill:#000" class="net_3"/>
  <line x1="132" x2="132" y1="43" y2="53" class="net_3"/>
  <line x1="52" x2="52" y1="105" y2="125" class="net_4"/>
  <line x1="132" x2="132" y1="103" y2="115" class="net_4"/>
  <line x1="132" x2="52" y1="115" y2="115" class="net_4"/>
  <circle cx="52" cy="115" r="2" style="fill:#000" class="net_4"/>
  <line x1="52" x2="52" y1="115" y2="125" class="net_4"/>
</svg>
