  <line x1="54" x2="54" y1="169" y2="184" class="net_3"/>
  <line x1="28" x2="28" y1="179" y2="254" class="net_4"/>
  <line x1="54" x2="54" y1="234" y2="244" class="net_4"/>
  <line x1="54" x2="28" y1="244" y2="244" class="net_4"/>
  <circle cx="28" cy="244" r="2" style="fill:#000" class="net_4"/>
  <line x1="28" x2="28" y1="244" y2="254" class="net_4"/>
</svg>
